version: '3'

services:

  vote:
    build: ./app/vote
    ports:
      - '5000:80'
    networks: [front-tier, back-tier]
    depends_on: [redis]

  result:
    build: ./app/result
    ports:
      - '5001:4000'
    networks: [front-tier, back-tier]
    depends_on: [db]

  worker:
    build: ./app/worker
    networks: [back-tier]
    depends_on: [redis, db]

  redis:
    image: redis:7-alpine
    networks: [back-tier]

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    networks: [back-tier]
    volumes: [db-data:/var/lib/postgresql/data]

networks:
  front-tier:
  back-tier:

volumes:
  db-data:
