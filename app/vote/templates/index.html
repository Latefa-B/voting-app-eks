<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Voting App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; background: #1a1a2e; color: #eee; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { text-align: center; font-size: 2.5rem; margin: 2rem 0; color: #e94560; }
    h2 { text-align: center; color: #aaa; margin-bottom: 2rem; font-weight: 300; }
    .choices { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
    .choice { flex: 1; min-width: 200px; max-width: 350px; }
    .btn { width: 100%; padding: 3rem 1rem; font-size: 2rem; font-weight: bold;
           border: none; border-radius: 16px; cursor: pointer; transition: transform 0.1s; }
    .btn:hover { transform: scale(1.03); }
    .btn-a { background: #e94560; color: white; }
    .btn-b { background: #0f3460; color: white; }
    .voted { text-align: center; margin-top: 2rem; font-size: 1.2rem; color: #4ecca3; }
    .footer { text-align: center; margin-top: 3rem; color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>What do you prefer?</h1>
    <h2>Cast your vote</h2>
    <form method="POST" action="/">
      <div class="choices">
        <div class="choice">
          <button class="btn btn-a" name="vote" value="a">{{ option_a }}</button>
        </div>
        <div class="choice">
          <button class="btn btn-b" name="vote" value="b">{{ option_b }}</button>
        </div>
      </div>
      {% if vote %}
      <p class="voted">You voted for <strong>{{ option_a if vote == 'a' else option_b }}</strong>!</p>
      {% endif %}
    </form>
    <p class="footer">Served by pod: {{ hostname }}</p>
  </div>
</body>
</html>
