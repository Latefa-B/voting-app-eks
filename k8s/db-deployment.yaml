apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: vote
spec:
  replicas: 1
  selector:
    matchLabels: { app: db }
  template:
    metadata:
      labels: { app: db }
    spec:
      containers:
        - name: db
          image: postgres:15-alpine
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: POSTGRES_DB, value: votes }
          ports: [{ containerPort: 5432 }]
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "250m" }
          volumeMounts:
            - { name: db-data, mountPath: /var/lib/postgresql/data }
      volumes:
        - { name: db-data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: vote
spec:
  selector: { app: db }
  ports: [{ port: 5432, targetPort: 5432 }]
  type: ClusterIP
